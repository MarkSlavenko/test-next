services:
  postgres:
    image: postgres:15-alpine
    container_name: search_db
    environment:
      POSTGRES_USER: search_user
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: search_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: